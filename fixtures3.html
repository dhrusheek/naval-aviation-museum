<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gallery</title>
        <link rel="shortcut icon" type="x-icon" href="navynamlogo (2).png">
    <link rel="stylesheet" type="text/css" href="aboutus2.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Playwrite+BE+VLG:wght@100..400&display=swap');
        body, html {
            margin: 0;
            padding: 0;
            background-image: url(harr.JPG);
            background-attachment: fixed;
            font-family: "Manrope", sans-serif;
        }
        

        .gallery-container {
            width: 100%;
            
            margin: 0;
            padding: 0;
        
            
            background-color: rgba(0, 0, 0, 0.388);
        }

        #galinfo h1{
            align-self: center;
            font-size: 3.5vw;
            margin: 0;
            padding: 0;
            
        }
        #galinfo {
            display: flex;
    justify-content: center; /* Horizontally centers the text */
    align-items: center;  
    background: linear-gradient(to right, rgba(0, 11, 165, 0.29), rgba(0, 0, 0, 0.485));
        }

        .gallery{
            display: flex;
            justify-self: center;
            justify-items: center;
            flex-wrap: wrap;
            
            
            justify-content: center;
            align-self: center;
            align-items: center;
            align-content: center;
        }

        .gallery img {
            object-fit: cover;
            cursor: pointer;
            width: 100%;
            height: auto;
            width: 300px;
            height: 300px;
            margin: 15px;
            transition: transform 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Lightbox CSS */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #lightbox img {
            max-width: 80%;
            max-height: 80%;
            margin: 0 auto;
            display: block;
        }

        #lightbox .close-btn, #lightbox .prev-btn, #lightbox .next-btn {
            position: absolute;
            color: white;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }

        #lightbox .close-btn {
            top: 10px;
            right: 20px;
        }

        #lightbox .prev-btn {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        #lightbox .next-btn {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Image count */
        #lightbox .image-count {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 18px;
        }

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Gallery</title>
</head>
<body>

    <div id="Header">
        <img class="namlogo" src="NAM.JPG" alt="">
        
    
    
        <header>
            
            
            <a href="index.html">Home</a>
            <a href="aboutus2.html">About us</a>
            <a href="fixtures3.html">Gallery</a>
            <a href="feedback.html">Feedback</a>
      
            
            
        </header>
    </div>

    <div id="galinfo"><H1>Gallery</H1></div>

    <div class="gallery-container">
        <div class="gallery">
            <img src="harr.JPG" alt="Sea Harrier" data-info="The Sea Harrier, a renowned aircraft in the Indian Navy...">
            <img src="vr.jpg" alt="Virtual Reality Corner" data-info="The virtual reality corner offers an 'Out of this world experience'...">
            <img src="plane.JPG" alt="Sea Hawk" data-info="The Sea Hawk, a prominent aircraft in the Indian Navy...">
            <img src="ht-2.JPG" alt="HT-2" data-info="The HT-2, India's first indigenously designed aircraft...">
            <img src="hughes.JPG" alt="Hughes" data-info="The Hughes aircraft played a significant role in the history of helicopter aviation in India...">
            <img src="cafe.jpg" alt="">
            <img src="cafeout.jpg" alt="">
            <img src="engine.jpg" alt="">
            <img src="islander.JPG" alt="">
            <img src="seaKing.JPG" alt="">
            <img src="ships.JPG" alt="">
            <img src="superConstellation.JPG" alt="">
            <img src="superConstellation.JPG" alt="">
            <img src="vampire.JPG" alt="">
            <img src="vikrantModel.JPG" alt="">
            <img src="viraatModel.JPG" alt="">
            <img src="gallery (1).jpg" alt="">
            <img src="gallery (2).jpg" alt="">
            <img src="gallery (3).jpg" alt="">
            <img src="gallery (4).jpg" alt="">
            <img src="gallery (1).webp" alt="">
            <img src="gallery (2).webp" alt="">
            <img src="gallery (3).webp" alt="">
            <img src="boards1.JPG" alt="">
            
            <!-- Add more images similarly -->
        </div>

        
    </div>
    
    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close-btn">&times;</span>
        <span class="prev-btn">&#10094;</span>
        <span class="next-btn">&#10095;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="image-count" id="image-count"></div>
    </div>

    

    <script>
        const galleryImages = document.querySelectorAll('.gallery img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close-btn');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const imageCount = document.getElementById('image-count');
        let currentIndex = 0;

        // Show lightbox when an image is clicked
        galleryImages.forEach((img, index) => {
            img.addEventListener('click', () => {
                lightbox.style.display = 'flex';
                lightboxImg.src = img.src;
                currentIndex = index;
                updateImageCount();
            });
        });

        // Close lightbox
        closeBtn.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });

        // Show next image
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            lightboxImg.src = galleryImages[currentIndex].src;
            updateImageCount();
        });

        // Show previous image
        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            lightboxImg.src = galleryImages[currentIndex].src;
            updateImageCount();
        });

        document.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if (window.scrollY > 100) {
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }
});

        // Update image count display
        function updateImageCount() {
            imageCount.textContent = `${currentIndex + 1} of ${galleryImages.length}`;
        }
    </script>

</body>
</html>
