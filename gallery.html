<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbox Gallery with Caption</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <div class="gallery">
    <img src="2b739bab4d0a6f6eee1434c6e4e6942e.jpg" alt="Image 1" class="gallery-item" onclick="openLightbox(0)">
    <img src="3-rama-1.jpg" alt="Image 2" class="gallery-item" onclick="openLightbox(1)">
    <img src="1000_F_549374195_orUmIHvHNmgdt3gqeWbfVlYx0UjFjtOW.jpg" alt="Image 3" class="gallery-item" onclick="openLightbox(2)">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-content">
      <div class="image-container">
        <img id="lightbox-img">
      </div>
      <div class="text-container">
        <h1 id="heading"></h1>
        <div id="caption" class="caption"></div>
      </div>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
